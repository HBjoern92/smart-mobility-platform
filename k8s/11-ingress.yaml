apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smart-mobility-ingress
  namespace: default
  annotations:
    # Works with the Gateway Controller already installed in the cluster
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  rules:
    - http:
        paths:
          # Frontend – catch-all root
          - path: /()(.*)
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          # API Gateway – all /api/** calls
          - path: /api(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8000

          # Analytics – direct access for dashboard
          - path: /analytics(/|$)(.*)
            pathType: Prefix
            backend:
              service:
                name: analytics-service
                port:
                  number: 8004
