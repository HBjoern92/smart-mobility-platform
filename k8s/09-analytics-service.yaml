apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: default
spec:
  replicas: 1    # Spark batch jobs don't benefit from multiple replicas
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: ghcr.io/hbjoern92/analytics-service:latest
          ports:
            - containerPort: 8004
          envFrom:
            - configMapRef:
                name: smart-mobility-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds:       10
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds:       15
          resources:
            requests:
              memory: "512Mi"   # Spark needs more memory
              cpu:    "250m"
            limits:
              memory: "1Gi"
              cpu:    "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: default
spec:
  selector:
    app: analytics-service
  ports:
    - port:       8004
      targetPort: 8004
