<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Mobility Platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f1117;
      --surface:  #1a1d27;
      --border:   #2a2d3a;
      --accent:   #6c63ff;
      --accent2:  #00d4aa;
      --danger:   #ff5c5c;
      --text:     #e8eaf0;
      --muted:    #7a7f9a;
      --radius:   12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 20px; font-weight: 600; }
    header span { font-size: 13px; color: var(--muted); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); margin-left: auto; }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 0;
      height: calc(100vh - 57px);
    }

    /* ── LEFT PANEL ── */
    .panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }

    input, select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    button {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .4; cursor: not-allowed; }

    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-success  { background: var(--accent2); color: #0f1117; }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-ghost    { background: var(--border);  color: var(--text); }

    .estimate-box {
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: none;
    }
    .estimate-box.show { display: block; }
    .estimate-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
    .estimate-row span:last-child { font-weight: 600; color: var(--accent2); }

    /* ── RIGHT PANEL ── */
    .main {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      width: fit-content;
    }
    .tab {
      padding: 7px 18px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      border: none;
      background: none;
      width: auto;
      transition: background .15s, color .15s;
    }
    .tab.active { background: var(--accent); color: #fff; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Status badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-PENDING           { background: #2a2d3a; color: #aab; }
    .badge-PAYMENT_PROCESSED { background: #1a3a4a; color: #5bf; }
    .badge-DRIVER_ASSIGNED   { background: #1a3a2a; color: #4d8; }
    .badge-IN_PROGRESS       { background: #2a3a1a; color: #9d4; }
    .badge-COMPLETED         { background: #1a3a2a; color: var(--accent2); }
    .badge-CANCELLED         { background: #3a1a1a; color: var(--danger); }

    /* Ride cards */
    .ride-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }
    .ride-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .ride-id { font-size: 12px; color: var(--muted); font-family: monospace; }
    .ride-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
    .meta-item { font-size: 12px; color: var(--muted); }
    .meta-item strong { display: block; font-size: 14px; color: var(--text); }

    .ride-actions { display: flex; gap: 8px; margin-top: 12px; }
    .ride-actions button { width: auto; padding: 7px 14px; font-size: 13px; }

    /* Log */
    .log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-family: monospace;
      font-size: 12px;
      height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .log-entry { display: flex; gap: 10px; }
    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-ok   { color: var(--accent2); }
    .log-err  { color: var(--danger); }
    .log-info { color: #aab; }

    /* KPI grid */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .kpi-value { font-size: 28px; font-weight: 700; color: var(--accent2); }
    .kpi-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* Driver panel */
    .driver-list { display: flex; flex-direction: column; gap: 10px; }
    .driver-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .driver-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
    }
    .driver-info { flex: 1; }
    .driver-name { font-weight: 600; font-size: 14px; }
    .driver-id   { font-size: 11px; color: var(--muted); font-family: monospace; }
    .avail-dot   { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .avail-true  { background: var(--accent2); }
    .avail-false { background: var(--danger); }

    .empty { color: var(--muted); font-size: 13px; text-align: center; padding: 32px; }

    /* Polling indicator */
    .polling-badge {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent2);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  </style>
</head>
<body>

<header>
  <div style="font-size:22px">🚗</div>
  <h1>Smart Mobility</h1>
  <span>Platform Dashboard</span>
  <div class="dot"></div>
</header>

<div class="layout">

  <!-- ═══════════════════════ LEFT PANEL ═══════════════════════ -->
  <div class="panel">

    <!-- Book a ride -->
    <div>
      <div class="section-title">Fahrt buchen</div>
      <div class="card">
        <label>Benutzername</label>
        <input id="username" type="text" placeholder="z.B. alice" value="alice" />

        <label>Start (Lat / Lon)</label>
        <div class="row">
          <input id="start_lat" type="number" step="any" placeholder="Lat" value="48.1351" />
          <input id="start_lon" type="number" step="any" placeholder="Lon" value="11.5820" />
        </div>

        <label>Ziel (Lat / Lon)</label>
        <div class="row">
          <input id="end_lat" type="number" step="any" placeholder="Lat" value="48.1900" />
          <input id="end_lon" type="number" step="any" placeholder="Lon" value="11.6200" />
        </div>

        <div class="estimate-box" id="estimate-box">
          <div class="estimate-row"><span>Distanz</span><span id="est-dist">–</span></div>
          <div class="estimate-row"><span>Fahrzeit</span><span id="est-eta">–</span></div>
          <div class="estimate-row"><span>Preis</span><span id="est-price">–</span></div>
        </div>

        <button class="btn-ghost" onclick="getEstimate()" style="margin-bottom:8px">
          🔍 Preis berechnen
        </button>
        <button class="btn-primary" onclick="bookRide()">
          🚕 Fahrt buchen
        </button>
      </div>
    </div>

    <!-- Register driver -->
    <div>
      <div class="section-title">Fahrer registrieren</div>
      <div class="card">
        <label>Fahrer-ID</label>
        <input id="drv-id" type="text" placeholder="z.B. driver-01" value="driver-01" />
        <label>Name</label>
        <input id="drv-name" type="text" placeholder="z.B. Max Mustermann" value="Max Mustermann" />
        <button class="btn-success" onclick="registerDriver()">
          ➕ Fahrer registrieren
        </button>
      </div>
    </div>

    <!-- Event log -->
    <div>
      <div class="section-title">Event Log</div>
      <div class="log" id="log"></div>
    </div>

  </div>

  <!-- ═══════════════════════ RIGHT PANEL ═══════════════════════ -->
  <div class="main">

    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('rides')">Fahrten</button>
        <button class="tab" onclick="switchTab('drivers')">Fahrer</button>
        <button class="tab" onclick="switchTab('analytics')">Analytics</button>
      </div>
      <div class="polling-badge">
        <div class="pulse"></div> Live-Polling aktiv
      </div>
    </div>

    <!-- ── TAB: Fahrten ── -->
    <div class="tab-content active" id="tab-rides">
      <div id="rides-list"><div class="empty">Noch keine Fahrten – buche eine Fahrt links.</div></div>
    </div>

    <!-- ── TAB: Fahrer ── -->
    <div class="tab-content" id="tab-drivers">
      <div class="driver-list" id="drivers-list">
        <div class="empty">Noch keine Fahrer registriert.</div>
      </div>
    </div>

    <!-- ── TAB: Analytics ── -->
    <div class="tab-content" id="tab-analytics">
      <div style="display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap">
        <button class="btn-primary" style="width:auto;padding:9px 18px" onclick="loadAnalytics()">
          🔄 KPIs laden
        </button>
        <button class="btn-ghost" style="width:auto;padding:9px 18px" onclick="triggerJob()">
          ⚡ Batch Job manuell starten
        </button>
      </div>
      <div class="kpi-grid" id="kpi-grid">
        <div class="empty" style="grid-column:1/-1">Noch keine KPI-Daten. Starte den Batch Job.</div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const API = 'http://localhost:8000';   // API Gateway URL

  // ── State ───────────────────────────────────────────────────────────────
  let trackedRides = new Set();   // ride IDs we're polling
  let currentUsername = '';

  // ── Helpers ─────────────────────────────────────────────────────────────
  function log(msg, type = 'info') {
    const el = document.getElementById('log');
    const now = new Date().toLocaleTimeString('de-DE');
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML = `<span class="log-time">${now}</span><span class="log-${type}">${msg}</span>`;
    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
  }

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const resp = await fetch(API + path, opts);
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || JSON.stringify(data));
    return data;
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      const names = ['rides','drivers','analytics'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'drivers') loadDrivers();
    if (name === 'analytics') loadAnalytics();
  }

  function statusBadge(status) {
    return `<span class="badge badge-${status}">${status.replace('_', ' ')}</span>`;
  }

  // ── Estimate ────────────────────────────────────────────────────────────
  async function getEstimate() {
    try {
      const body = getCoords();
      body.username = document.getElementById('username').value.trim() || 'user';
      const data = await api('POST', '/rides/estimate', body);
      document.getElementById('est-dist').textContent  = data.distance_km + ' km';
      document.getElementById('est-eta').textContent   = data.eta_minutes + ' min';
      document.getElementById('est-price').textContent = '€ ' + data.price_eur;
      document.getElementById('estimate-box').classList.add('show');
      log(`Schätzung: ${data.distance_km}km – €${data.price_eur}`, 'ok');
    } catch (e) { log('Schätzung fehlgeschlagen: ' + e.message, 'err'); }
  }

  function getCoords() {
    return {
      start_lat: parseFloat(document.getElementById('start_lat').value),
      start_lon: parseFloat(document.getElementById('start_lon').value),
      end_lat:   parseFloat(document.getElementById('end_lat').value),
      end_lon:   parseFloat(document.getElementById('end_lon').value),
    };
  }

  // ── Book ride ───────────────────────────────────────────────────────────
  async function bookRide() {
    try {
      const username = document.getElementById('username').value.trim() || 'user';
      currentUsername = username;
      const body = { username, ...getCoords() };
      const ride = await api('POST', '/rides', body);
      log(`Fahrt gebucht: ${ride.id.slice(0,8)}… – PENDING`, 'ok');
      trackedRides.add(ride.id);
      renderRide(ride);
      switchTab('rides');
    } catch (e) { log('Buchung fehlgeschlagen: ' + e.message, 'err'); }
  }

  // ── Render a ride card ───────────────────────────────────────────────────
  function renderRide(ride) {
    const container = document.getElementById('rides-list');
    // Remove empty placeholder
    container.querySelectorAll('.empty').forEach(e => e.remove());

    let el = document.getElementById('ride-' + ride.id);
    if (!el) {
      el = document.createElement('div');
      el.className = 'ride-card';
      el.id = 'ride-' + ride.id;
      container.prepend(el);
    }

    const canCancel   = !['COMPLETED','CANCELLED'].includes(ride.status);
    const canComplete = ['DRIVER_ASSIGNED','IN_PROGRESS'].includes(ride.status);

    el.innerHTML = `
      <div class="ride-header">
        <span class="ride-id">${ride.id.slice(0,18)}…</span>
        ${statusBadge(ride.status)}
      </div>
      <div class="ride-meta">
        <div class="meta-item"><strong>${ride.distance_km} km</strong>Distanz</div>
        <div class="meta-item"><strong>€ ${ride.price_eur}</strong>Preis</div>
        <div class="meta-item"><strong>${ride.eta_minutes} min</strong>ETA</div>
        <div class="meta-item"><strong>${ride.username}</strong>Nutzer</div>
        <div class="meta-item"><strong>${ride.driver_id || '–'}</strong>Fahrer</div>
        <div class="meta-item"><strong>${new Date(ride.created_at).toLocaleTimeString('de-DE')}</strong>Erstellt</div>
      </div>
      ${ride.current_lat ? `<div style="font-size:12px;color:var(--muted);margin-top:8px">
        📍 ${ride.current_lat.toFixed(4)}, ${ride.current_lon.toFixed(4)}</div>` : ''}
      <div class="ride-actions">
        ${canCancel   ? `<button class="btn-danger" onclick="cancelRide('${ride.id}')">Stornieren</button>` : ''}
        ${canComplete ? `<button class="btn-success" onclick="completeRide('${ride.id}','${ride.driver_id}')">✓ Angekommen</button>` : ''}
        <button class="btn-ghost" onclick="refreshRide('${ride.id}')">↻ Aktualisieren</button>
      </div>
    `;
  }

  async function cancelRide(id) {
    try {
      const ride = await api('POST', `/rides/${id}/cancel`, {});
      log(`Fahrt ${id.slice(0,8)}… storniert`, 'err');
      renderRide(ride);
      trackedRides.delete(id);
    } catch (e) { log('Stornierung fehlgeschlagen: ' + e.message, 'err'); }
  }

  async function completeRide(rideId, driverId) {
    try {
      await api('POST', `/drivers/rides/${rideId}/complete`, { driver_id: driverId });
      log(`Fahrt ${rideId.slice(0,8)}… abgeschlossen`, 'ok');
      trackedRides.delete(rideId);
      setTimeout(() => refreshRide(rideId), 800);
    } catch (e) { log('Abschluss fehlgeschlagen: ' + e.message, 'err'); }
  }

  async function refreshRide(id) {
    try {
      const ride = await api('GET', `/rides/${id}`);
      renderRide(ride);
    } catch (e) { log('Refresh fehlgeschlagen: ' + e.message, 'err'); }
  }

  // ── Drivers ─────────────────────────────────────────────────────────────
  async function registerDriver() {
    try {
      const driver_id = document.getElementById('drv-id').value.trim();
      const name      = document.getElementById('drv-name').value.trim();
      await api('POST', '/drivers', { driver_id, name });
      log(`Fahrer registriert: ${name} (${driver_id})`, 'ok');
      loadDrivers();
    } catch (e) { log('Registrierung fehlgeschlagen: ' + e.message, 'err'); }
  }

  async function loadDrivers() {
    try {
      const drivers = await api('GET', '/drivers');
      const list    = document.getElementById('drivers-list');
      if (!drivers.length) {
        list.innerHTML = '<div class="empty">Keine Fahrer registriert.</div>';
        return;
      }
      list.innerHTML = drivers.map(d => `
        <div class="driver-card">
          <div class="driver-avatar">${d.name.charAt(0).toUpperCase()}</div>
          <div class="driver-info">
            <div class="driver-name">${d.name}</div>
            <div class="driver-id">${d.driver_id}${d.current_ride_id ? ' · Fahrt: ' + d.current_ride_id.slice(0,8) + '…' : ''}</div>
          </div>
          <div class="avail-dot avail-${d.available}" title="${d.available ? 'Verfügbar' : 'Beschäftigt'}"></div>
        </div>
      `).join('');
    } catch (e) { log('Fahrerliste: ' + e.message, 'err'); }
  }

  // ── Analytics ───────────────────────────────────────────────────────────
  async function loadAnalytics() {
    try {
      const data = await api('GET', '/analytics/latest');   // routed via gateway
      const kpis = data.kpis || {};
      const grid = document.getElementById('kpi-grid');
      const items = [
        { label: 'Fahrten gesamt',    value: kpis.total_rides         ?? '–' },
        { label: 'Abgeschlossen',     value: kpis.completed_rides     ?? '–' },
        { label: 'Abgebrochen',       value: kpis.cancelled_rides     ?? '–' },
        { label: 'Completion Rate',   value: (kpis.completion_rate_pct ?? '–') + '%' },
        { label: 'Ø Preis',           value: '€ ' + (kpis.avg_price_eur    ?? '–') },
        { label: 'Ø Distanz',         value: (kpis.avg_distance_km ?? '–') + ' km' },
        { label: 'Ø ETA',             value: (kpis.avg_eta_minutes  ?? '–') + ' min' },
        { label: 'Umsatz gesamt',     value: '€ ' + (kpis.revenue_eur ?? '–') },
      ];
      grid.innerHTML = items.map(i => `
        <div class="kpi-card">
          <div class="kpi-value">${i.value}</div>
          <div class="kpi-label">${i.label}</div>
        </div>
      `).join('');

      if (kpis.top_users?.length) {
        grid.innerHTML += `
          <div class="kpi-card" style="grid-column:1/-1;text-align:left">
            <div class="kpi-label" style="margin-bottom:10px">Top Nutzer</div>
            ${kpis.top_users.map((u,i) => `
              <div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid var(--border)">
                <span>${i+1}. ${u.username}</span>
                <span style="color:var(--accent2)">${u.ride_count} Fahrten</span>
              </div>`).join('')}
          </div>`;
      }
      log('KPIs geladen', 'ok');
    } catch (e) { log('KPIs: ' + e.message, 'err'); }
  }

  async function triggerJob() {
    log('Batch Job wird gestartet…', 'info');
    try {
      const data = await api('POST', '/analytics/trigger?source=mongo');
      log(`Batch Job abgeschlossen – ${data.kpis?.total_rides ?? 0} Fahrten analysiert`, 'ok');
      loadAnalytics();
    } catch (e) { log('Batch Job fehlgeschlagen: ' + e.message, 'err'); }
  }

  // ── Live polling ─────────────────────────────────────────────────────────
  setInterval(async () => {
    for (const id of trackedRides) {
      try {
        const ride = await api('GET', `/rides/${id}`);
        renderRide(ride);
        // Stop polling terminal states
        if (['COMPLETED','CANCELLED'].includes(ride.status)) {
          trackedRides.delete(id);
          log(`Fahrt ${id.slice(0,8)}… → ${ride.status}`, ride.status === 'COMPLETED' ? 'ok' : 'err');
        }
      } catch (_) {}
    }
  }, 3000);

  // ── Init ────────────────────────────────────────────────────────────────
  log('Dashboard geladen – bereit', 'ok');
</script>
</body>
</html>
